<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loading...</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 100vw;
      height: 100vh;
      background: #0a0a0a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, sans-serif;
      overflow: hidden;
    }
    
    .loading-container {
      text-align: center;
      color: #fff;
      z-index: 10;
    }
    
    .glow {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(200, 50, 50, 0.3) 0%, transparent 70%);
      pointer-events: none;
    }
    
    .spinner-container {
      position: relative;
      width: 80px;
      height: 80px;
      margin: 0 auto 24px;
    }
    
    .spinner-ring {
      position: absolute;
      inset: -16px;
      border: 4px solid rgba(200, 50, 50, 0.3);
      border-top-color: #c83232;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    .spinner-inner {
      position: absolute;
      inset: -8px;
      background: rgba(200, 50, 50, 0.2);
      border-radius: 16px;
      animation: pulse 2s ease-in-out infinite;
    }
    
    .app-icon {
      width: 80px;
      height: 80px;
      border-radius: 16px;
      border: 2px solid rgba(200, 50, 50, 0.5);
      box-shadow: 0 0 30px rgba(200, 50, 50, 0.3);
      object-fit: cover;
      display: none;
    }
    
    .loading-text {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    
    .loading-dots {
      display: flex;
      justify-content: center;
      gap: 6px;
      margin-bottom: 16px;
    }
    
    .dot {
      width: 8px;
      height: 8px;
      background: #c83232;
      border-radius: 50%;
      animation: bounce 1.4s ease-in-out infinite;
    }
    
    .dot:nth-child(1) { animation-delay: 0s; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    
    .status {
      font-size: 14px;
      color: #888;
      transition: color 0.3s ease;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }
    
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0); }
      40% { transform: scale(1); }
    }
    
    iframe {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s ease;
      z-index: 20;
      background: #fff;
    }
    
    iframe.loaded {
      opacity: 1;
      pointer-events: all;
    }
  </style>
</head>
<body>
  <div class="glow"></div>
  
  <div class="loading-container" id="loadingUI">
    <div class="spinner-container">
      <div class="spinner-ring"></div>
      <div class="spinner-inner"></div>
      <img id="appIcon" class="app-icon" src="" alt="App Icon">
    </div>
    <p class="loading-text" id="loadingText">Loading...</p>
    <div class="loading-dots">
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot"></span>
    </div>
    <p class="status" id="statusText">Connecting to secure proxy network...</p>
  </div>

  <iframe id="proxyFrame" name="proxyFrame" sandbox="allow-scripts allow-forms allow-same-origin allow-pointer-lock allow-downloads allow-popups" allow="fullscreen; autoplay; clipboard-read; clipboard-write"></iframe>

  <script src="/uv/uv.config.js" defer></script>
  <script src="/uv/uv.bundle.js" defer></script>

  <script>
    const params = new URLSearchParams(window.location.search);
    const targetUrl = params.get('url') || 'https://www.google.com';
    const appName = params.get('name') || 'App';
    const appIcon = params.get('icon') || '';
    
    const iframe = document.getElementById('proxyFrame');
    const loadingUI = document.getElementById('loadingUI');
    const statusText = document.getElementById('statusText');
    const iconElement = document.getElementById('appIcon');
    
    document.getElementById('loadingText').textContent = `Loading ${appName}...`;
    if (appIcon) {
      iconElement.src = appIcon;
      iconElement.style.display = 'block';
    }
    
    function launchProxy() {
      try {
        // Checking if Ultraviolet scripts are registered locally
        if (typeof __uv$config !== 'undefined') {
          statusText.textContent = 'Initializing Ultraviolet session...';
          iframe.src = __uv$config.prefix + __uv$config.encodeUrl(targetUrl);
        } else {
          // FALLBACK: If no local backend is detected, route through an iframe-safe public node
          statusText.textContent = 'Routing via public network node...';
          iframe.src = `https://cdn.embedly.com/widgets/media.html?src=${encodeURIComponent(targetUrl)}`;
        }
      } catch (err) {
        statusText.textContent = 'Proxy configuration error.';
        statusText.style.color = '#ff6b6b';
        console.error(err);
      }
    }

    // Run the proxy launch sequence
    window.addEventListener('DOMContentLoaded', launchProxy);
    
    // Handle successful iframe rendering
    iframe.onload = function() {
      loadingUI.style.display = 'none';
      iframe.classList.add('loaded');
    };
    
    // Safety timers to update status messages if loading is slow
    setTimeout(() => {
      if (!iframe.classList.contains('loaded')) {
        statusText.textContent = 'Securing connection tunnel...';
      }
    }, 4000);
    
    setTimeout(() => {
      if (!iframe.classList.contains('loaded')) {
        statusText.textContent = 'Taking longer than usual, verifying server health...';
      }
    }, 9000);
  </script>
</body>
</html>
