<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loading...</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 100vw;
      height: 100vh;
      background: #0a0a0a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, sans-serif;
      overflow: hidden;
    }
    
    .loading-container {
      text-align: center;
      color: #fff;
    }
    
    .glow {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(200, 50, 50, 0.3) 0%, transparent 70%);
      pointer-events: none;
    }
    
    .spinner-container {
      position: relative;
      width: 80px;
      height: 80px;
      margin: 0 auto 24px;
    }
    
    .spinner-ring {
      position: absolute;
      inset: -16px;
      border: 4px solid rgba(200, 50, 50, 0.3);
      border-top-color: #c83232;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    .spinner-inner {
      position: absolute;
      inset: -8px;
      background: rgba(200, 50, 50, 0.2);
      border-radius: 16px;
      animation: pulse 2s ease-in-out infinite;
    }
    
    .app-icon {
      width: 80px;
      height: 80px;
      border-radius: 16px;
      border: 2px solid rgba(200, 50, 50, 0.5);
      box-shadow: 0 0 30px rgba(200, 50, 50, 0.3);
      object-fit: cover;
    }
    
    .loading-text {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    
    .loading-dots {
      display: flex;
      justify-content: center;
      gap: 6px;
      margin-bottom: 16px;
    }
    
    .dot {
      width: 8px;
      height: 8px;
      background: #c83232;
      border-radius: 50%;
      animation: bounce 1.4s ease-in-out infinite;
    }
    
    .dot:nth-child(1) { animation-delay: 0s; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    
    .status {
      font-size: 14px;
      color: #888;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }
    
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0); }
      40% { transform: scale(1); }
    }
    
    /* Hidden form for CroxyProxy submission */
    #proxyForm {
      display: none;
    }
    
    iframe {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
      display: none;
    }
    
    iframe.loaded {
      display: block;
    }
  </style>
</head>
<body>
  <div class="glow"></div>
  
  <div class="loading-container" id="loadingUI">
    <div class="spinner-container">
      <div class="spinner-ring"></div>
      <div class="spinner-inner"></div>
      <img id="appIcon" class="app-icon" src="" alt="App Icon">
    </div>
    <p class="loading-text" id="loadingText">Loading App...</p>
    <div class="loading-dots">
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot"></span>
    </div>
    <p class="status" id="statusText">Connecting to proxy...</p>
  </div>

  <iframe id="proxyFrame" sandbox="allow-scripts allow-forms allow-same-origin allow-pointer-lock allow-downloads allow-popups" allow="fullscreen; autoplay; clipboard-read; clipboard-write"></iframe>

  <script>
    // Get parameters from URL
    const params = new URLSearchParams(window.location.search);
    const targetUrl = params.get('url') || 'https://www.youtube.com/';
    const appName = params.get('name') || 'App';
    const appIcon = params.get('icon') || '';
    
    // Update UI
    document.getElementById('loadingText').textContent = `Loading ${appName}...`;
    if (appIcon) {
      document.getElementById('appIcon').src = appIcon;
    }
    
    // CroxyProxy URL format - encode the target URL
    const encodedUrl = btoa(targetUrl);
    const proxyUrl = `https://www.croxyproxy.rocks/` + encodedUrl;
    
    const iframe = document.getElementById('proxyFrame');
    const loadingUI = document.getElementById('loadingUI');
    const statusText = document.getElementById('statusText');
    
    // Try to load via CroxyProxy
    statusText.textContent = 'Launching proxy...';
    
    // Set iframe source to CroxyProxy with the target URL
    iframe.src = `https://www.croxyproxy.rocks/?url=${encodeURIComponent(targetUrl)}`;
    
    iframe.onload = function() {
      loadingUI.style.display = 'none';
      iframe.classList.add('loaded');
    };
    
    // Timeout fallback - keep showing loading if it takes too long
    setTimeout(() => {
      statusText.textContent = 'Still connecting...';
    }, 5000);
    
    setTimeout(() => {
      statusText.textContent = 'This may take a moment...';
    }, 10000);
  </script>
</body>
</html>
