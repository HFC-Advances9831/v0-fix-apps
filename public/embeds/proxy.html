<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loading...</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 100vw;
      height: 100vh;
      background: #0a0a0a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, sans-serif;
      overflow: hidden;
    }
    
    .loading-container {
      text-align: center;
      color: #fff;
      z-index: 10;
    }
    
    .glow {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(200, 50, 50, 0.3) 0%, transparent 70%);
      pointer-events: none;
    }
    
    .spinner-container {
      position: relative;
      width: 80px;
      height: 80px;
      margin: 0 auto 24px;
    }
    
    .spinner-ring {
      position: absolute;
      inset: -16px;
      border: 4px solid rgba(200, 50, 50, 0.3);
      border-top-color: #c83232;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    .spinner-inner {
      position: absolute;
      inset: -8px;
      background: rgba(200, 50, 50, 0.2);
      border-radius: 16px;
      animation: pulse 2s ease-in-out infinite;
    }
    
    .app-icon {
      width: 80px;
      height: 80px;
      border-radius: 16px;
      border: 2px solid rgba(200, 50, 50, 0.5);
      box-shadow: 0 0 30px rgba(200, 50, 50, 0.3);
      object-fit: cover;
      display: none; /* Hidden until an icon is actually loaded */
    }
    
    .loading-text {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    
    .loading-dots {
      display: flex;
      justify-content: center;
      gap: 6px;
      margin-bottom: 16px;
    }
    
    .dot {
      width: 8px;
      height: 8px;
      background: #c83232;
      border-radius: 50%;
      animation: bounce 1.4s ease-in-out infinite;
    }
    
    .dot:nth-child(1) { animation-delay: 0s; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    
    .status {
      font-size: 14px;
      color: #888;
      transition: color 0.3s ease;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }
    
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0); }
      40% { transform: scale(1); }
    }
    
    iframe {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s ease;
      z-index: 20;
      background: #fff; /* Prevents transparent bleed-through */
    }
    
    iframe.loaded {
      opacity: 1;
      pointer-events: all;
    }
  </style>
</head>
<body>
  <div class="glow"></div>
  
  <div class="loading-container" id="loadingUI">
    <div class="spinner-container">
      <div class="spinner-ring"></div>
      <div class="spinner-inner"></div>
      <img id="appIcon" class="app-icon" src="" alt="App Icon">
    </div>
    <p class="loading-text" id="loadingText">Loading App...</p>
    <div class="loading-dots">
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot"></span>
    </div>
    <p class="status" id="statusText">Connecting to proxy engine...</p>
  </div>

  <form id="proxyForm" method="POST" target="proxyFrame" style="display: none;">
    <input type="hidden" name="url" id="proxyInput" value="">
  </form>

  <iframe id="proxyFrame" name="proxyFrame" sandbox="allow-scripts allow-forms allow-same-origin allow-pointer-lock allow-downloads allow-popups" allow="fullscreen; autoplay; clipboard-read; clipboard-write"></iframe>

  <script>
    // 1. Get parameters from URL
    const params = new URLSearchParams(window.location.search);
    const targetUrl = params.get('url') || 'https://www.google.com';
    const appName = params.get('name') || 'Application';
    const appIcon = params.get('icon') || '';
    
    // 2. DOM Elements
    const iframe = document.getElementById('proxyFrame');
    const loadingUI = document.getElementById('loadingUI');
    const statusText = document.getElementById('statusText');
    const iconElement = document.getElementById('appIcon');
    const form = document.getElementById('proxyForm');
    const formInput = document.getElementById('proxyInput');
    
    // 3. Update UI
    document.getElementById('loadingText').textContent = `Loading ${appName}...`;
    if (appIcon) {
      iconElement.src = appIcon;
      iconElement.style.display = 'block';
    }
    
    // 4. Proxy Engine Connection Logic
    statusText.textContent = 'Launching proxy engine...';
    
    /* * IMPORTANT: You need a proxy backend for this to work perfectly.
     * Below is the setup for a standard self-hosted proxy (like Ultraviolet).
     * Replace '/uv/service/' with your actual proxy path.
     */
     
    const proxyMethod = 'GET'; // Change to 'POST' if your engine uses form submission
    
    try {
      if (proxyMethod === 'GET') {
        // Example for Ultraviolet or standard GET proxies:
        // Commonly uses encodeURIComponent or a custom XOR encoder depending on backend
        const encodedUrl = encodeURIComponent(targetUrl);
        
        // ** CHANGE THIS TO YOUR BACKEND DOMAIN/PATH **
        // Right now, this just passes the raw URL to avoid breaking if you don't have a backend yet.
        const finalProxyUrl = targetUrl; // E.g., change to: `/uv/service/${encodedUrl}`
        
        iframe.src = finalProxyUrl;
      } else {
        // Example for POST-based proxies:
        form.action = '/your-proxy-endpoint'; // Set your backend POST endpoint here
        formInput.value = targetUrl;
        form.submit();
      }
    } catch (err) {
      statusText.textContent = 'Error launching proxy connection.';
      statusText.style.color = '#ff6b6b';
      console.error(err);
    }
    
    // 5. Handle successful load
    iframe.onload = function() {
      // Fade out loading UI, fade in iframe
      loadingUI.style.display = 'none';
      iframe.classList.add('loaded');
    };
    
    // 6. Timers to catch slow/failed loads
    setTimeout(() => {
      if (!iframe.classList.contains('loaded')) {
        statusText.textContent = 'Negotiating connection...';
      }
    }, 4000);
    
    setTimeout(() => {
      if (!iframe.classList.contains('loaded')) {
        statusText.textContent = 'This is taking longer than expected...';
      }
    }, 8000);
  </script>
</body>
</html>
