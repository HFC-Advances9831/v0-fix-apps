<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>YouTube - The Carey Network</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="apple-touch-icon" href="/images/icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="icon" href="/images/icon.png">
  <style>
    .game-frame {
      position: relative;
      width: 100%;
      height: calc(100vh - 160px);
      min-height: 300px;
      overflow: hidden;
      background: #000;
      border-radius: 8px;
    }
    .game-frame iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
    }
    #ytFallback {
      display: none;
      position: absolute;
      inset: 0;
      background: #0f0f0f;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      color: #fff;
      font-family: sans-serif;
      text-align: center;
      padding: 2rem;
    }
    #ytFallback h2 { font-size: 1.3rem; font-weight: 600; margin: 0; }
    #ytFallback p  { font-size: 0.95rem; color: #aaa; margin: 0; max-width: 300px; line-height: 1.5; }
    #ytFallback a.yt-open-btn {
      display: inline-block;
      background: #ff0000;
      color: #fff;
      text-decoration: none;
      font-weight: 700;
      font-size: 1.1rem;
      padding: 14px 36px;
      border-radius: 28px;
      margin-top: 6px;
    }
    #exitFullscreenBtn { display: none; }
  </style>
</head>
<body class="games-page">
<header class="site-header">
  <img src="/images/logo.png" class="logo" alt="The Carey Network Logo" />
</header>
<main>
  <section class="hero orange-bg">
    <div class="game-player">
      <div class="game-frame" id="youtubeContainer">

        <iframe
          id="gameFrame"
          src="https://www.youtube.com/embed?listType=search&list=trending"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; fullscreen"
          allowfullscreen
          webkitallowfullscreen
          frameborder="0"
          referrerpolicy="no-referrer-when-downgrade"
          title="YouTube">
        </iframe>

        <div id="ytFallback">
          <svg width="100" height="22" viewBox="0 0 100 22" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M15.5 1.5S9 1 4.5 1.5C2.2 1.8.5 3.5.2 5.8 0 7.5 0 11 0 11s0 3.5.2 5.2c.3 2.3 2 4 4.3 4.3C6.8 21 15.5 21 15.5 21s8.7 0 11-.5c2.3-.3 4-2 4.3-4.3C31 14.5 31 11 31 11s0-3.5-.2-5.2c-.3-2.3-2-4-4.3-4.3C24.2 1 15.5 1.5 15.5 1.5z" fill="#FF0000"/>
            <path d="M12.5 15.5l8-4.5-8-4.5v9z" fill="white"/>
            <path d="M38 16.5L34.5 5h2.6l1.3 5.6.4 1.6h.1l.4-1.6L40.6 5H43l-3.5 11.5v5.5H38v-5.5zm11.2.3c-.8 0-1.4-.3-1.8-.9v.9H45V4h2.2v4.8c.5-.6 1-.9 1.8-.9 1.6 0 2.4 1.2 2.4 3.7v1c0 2.4-.8 3.7-2.4 3.7zm-.6-1.9c.6 0 .9-.5.9-1.8v-1c0-1.3-.3-1.8-.9-1.8-.4 0-.7.2-1 .5v3.6c.3.3.6.5 1 .5zm9.2 1.9c-.8 0-1.4-.3-1.8-1v.9h-2.2V7.5h2.2v8.1c.3.4.7.6 1 .6.6 0 .8-.4.8-1V7.5h2.2v8.3c0 .7-.2 1.2-.5 1.6-.3.4-.9.7-1.7.7zm9.4-.1c-.4.1-.8.1-1.1.1-1.2 0-1.7-.6-1.7-1.8V9.3h-1.1V7.5h1.1V5.2h2.2v2.3h1.6v1.8h-1.6v5.5c0 .5.2.7.7.7.3 0 .5 0 .8-.1l.1 2zm2.8-11.9c-.4-.3-.6-.7-.6-1.2s.2-.9.6-1.2c.4-.3.8-.5 1.3-.5.5 0 .9.2 1.3.5.4.3.6.7.6 1.2s-.2.9-.6 1.2c-.4.3-.8.5-1.3.5-.5 0-.9-.2-1.3-.5zm-.1 12V7.5h2.2v9.6h-2.2zm10.3.1c-1.1 0-2-.3-2.6-1-.6-.7-.9-1.7-.9-3V12c0-1.3.3-2.3.9-2.9.6-.7 1.5-1 2.6-1 2.3 0 3.5 1.3 3.5 3.9V13c0 2.7-1.2 3.9-3.5 3.9zm0-1.9c1 0 1.3-.7 1.3-2V12c0-1.4-.4-2-1.3-2-1 0-1.3.7-1.3 2v1c0 1.4.4 2 1.3 2zm9.7 1.8c-.8 0-1.4-.3-1.8-1v.9h-2.2V4h2.2v4.8c.5-.6 1-.9 1.8-.9 1.6 0 2.4 1.2 2.4 3.7v1c0 2.4-.8 3.7-2.4 3.7zm-.6-1.9c.6 0 .9-.5.9-1.8v-1c0-1.3-.3-1.8-.9-1.8-.4 0-.7.2-1 .5v3.6c.3.3.6.5 1 .5z" fill="white"/>
          </svg>
          <h2>YouTube can't load here on Safari</h2>
          <p>Apple blocks YouTube from running inside iframes in Safari. Tap the button to open YouTube directly.</p>
          <a href="https://m.youtube.com" class="yt-open-btn">Open YouTube</a>
        </div>

      </div>
      <div class="game-controls">
        <button onclick="refreshGame()">
          <img src="/images/refresh.png" alt="Refresh">
        </button>
        <button onclick="toggleFullscreen()">
          <img src="/images/fullscreen.png" alt="Fullscreen">
        </button>
        <button onclick="openDeletePopup()">
          <img src="/images/delete.png" alt="Delete Save">
        </button>
      </div>
    </div>
  </section>
</main>
<div id="nav-container"></div>
<footer class="site-footer">
  <p>&copy; 2026 The Carey Network</p>
</footer>
<button id="exitFullscreenBtn" onclick="exitFullscreenMode()">&#x2715;</button>
<div id="deletePopup" class="popup-overlay">
  <div class="popup-content">
    <p>Delete Saves (ts purges all data btw bc im dumb)</p>
    <button onclick="confirmDelete()">Delete Saves</button>
    <button onclick="closeDeletePopup()" style="margin-top:10px; background:#333;">Cancel</button>
  </div>
</div>
<script src="/js/main.js"></script>
<script>
  var frame    = document.getElementById('gameFrame');
  var fallback = document.getElementById('ytFallback');

  /* Detect Safari (includes all iOS/iPadOS browsers — they all use WebKit) */
  var isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent)
              || /iPad|iPhone|iPod/.test(navigator.userAgent);

  if (isSafari) {
    /* Don't even try the iframe — show fallback immediately */
    showFallback();
  }

  function showFallback() {
    frame.style.display = 'none';
    fallback.style.display = 'flex';
  }

  function refreshGame() {
    if (fallback.style.display === 'flex') return;
    var src = frame.src;
    frame.src = '';
    setTimeout(function() { frame.src = src; }, 150);
  }

  function toggleFullscreen() {
    var container = document.getElementById('youtubeContainer');
    var btn = document.getElementById('exitFullscreenBtn');
    var isFS = document.fullscreenElement || document.webkitFullscreenElement;
    if (isFS) {
      if (document.exitFullscreen) document.exitFullscreen();
      else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
    } else {
      if (container.requestFullscreen) container.requestFullscreen();
      else if (container.webkitRequestFullscreen) container.webkitRequestFullscreen();
      btn.style.display = 'flex';
    }
  }

  function exitFullscreenMode() {
    if (document.exitFullscreen) document.exitFullscreen();
    else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
    document.getElementById('exitFullscreenBtn').style.display = 'none';
  }

  function openDeletePopup()  { document.getElementById('deletePopup').style.display = 'flex'; }
  function closeDeletePopup() { document.getElementById('deletePopup').style.display = 'none'; }

  function confirmDelete() {
    localStorage.clear();
    sessionStorage.clear();
    document.cookie.split(';').forEach(function(c) {
      var name = c.split('=')[0].trim();
      document.cookie = name + '=;expires=Thu, 01 Jan 1970 00:00:00 GMT;path=/';
    });
    closeDeletePopup();
    refreshGame();
  }

  document.addEventListener('fullscreenchange', function() {
    if (!document.fullscreenElement)
      document.getElementById('exitFullscreenBtn').style.display = 'none';
  });
  document.addEventListener('webkitfullscreenchange', function() {
    if (!document.webkitFullscreenElement)
      document.getElementById('exitFullscreenBtn').style.display = 'none';
  });
</script>
</body>
</html>
