<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>YouTube - Carey Network</title>
<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  overflow: hidden;
  background: #0f0f0f;
  font-family: sans-serif;
}

#loading-screen {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #0f0f0f;
  z-index: 100;
  transition: opacity 0.4s ease;
}

#loading-screen.hidden {
  opacity: 0;
  pointer-events: none;
}

.loader-content {
  text-align: center;
  color: #fff;
}

.logo {
  font-size: 24px;
  font-weight: bold;
  margin-bottom: 20px;
  color: #e74c3c;
}

.spinner {
  width: 40px;
  height: 40px;
  border: 4px solid rgba(255,255,255,0.1);
  border-top-color: #e74c3c;
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin: 0 auto 20px;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.loading-text {
  font-size: 14px;
  color: #888;
}

#appFrame {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  border: none;
  opacity: 0;
  transition: opacity 0.4s ease;
}

#appFrame.loaded {
  opacity: 1;
}
</style>
</head>
<body>

<div id="loading-screen">
  <div class="loader-content">
    <div class="logo">Carey Network</div>
    <div class="spinner"></div>
    <div class="loading-text">Loading YouTube Engine...</div>
  </div>
</div>

<!-- 
  Using yewtu.be (a public Invidious network node). 
  This loads a fully functional, browsable YouTube clone that works natively in iframes.
-->
<iframe
  id="appFrame"
  src="https://yewtu.be/feed/popular"
  sandbox="allow-scripts allow-forms allow-same-origin allow-pointer-lock allow-downloads allow-popups"
  allow="fullscreen; autoplay; clipboard-write"
  allowfullscreen
></iframe>

<script>
const frame = document.getElementById('appFrame');
const loader = document.getElementById('loading-screen');

// Hide loading screen when the proxy interface fully handles the initial load
const showFrame = () => {
  frame.classList.add('loaded');
  loader.classList.add('hidden');
};

frame.addEventListener('load', showFrame);
setTimeout(showFrame, 4000); // Fallback timeout
</script>

</body>
</html>
