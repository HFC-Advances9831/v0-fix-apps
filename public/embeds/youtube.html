<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>YouTube - Carey Network</title>
<style>
* {
  box-sizing: border-box;
}
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  background: #0f0f0f;
  color: #fff;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
}

/* Instant Loading Screen */
#loading-screen {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #0f0f0f;
  z-index: 100;
  transition: opacity 0.3s ease;
}
#loading-screen.hidden {
  opacity: 0;
  pointer-events: none;
}
.loader-content {
  text-align: center;
}
.logo {
  font-size: 24px;
  font-weight: bold;
  margin-bottom: 20px;
  color: #e74c3c;
  letter-spacing: 0.5px;
}
.spinner {
  width: 40px;
  height: 40px;
  border: 4px solid rgba(255,255,255,0.1);
  border-top-color: #e74c3c;
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin: 0 auto 20px;
}
@keyframes spin {
  to { transform: rotate(360deg); }
}

/* Main Dashboard Layout */
#app-interface {
  padding: 20px;
  max-width: 1200px;
  margin: 0 auto;
}

.header-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 15px;
  margin-bottom: 30px;
  border-bottom: 1px solid #222;
  padding-bottom: 20px;
}

.search-box {
  display: flex;
  width: 100%;
  max-width: 550px;
}
.search-box input {
  flex: 1;
  padding: 12px 15px;
  border: 1px solid #333;
  border-radius: 24px 0 0 24px;
  background: #121212;
  color: white;
  outline: none;
  font-size: 14px;
}
.search-box input:focus {
  border-color: #e74c3c;
}
.search-box button {
  padding: 12px 24px;
  border: none;
  background: #e74c3c;
  color: white;
  border-radius: 0 24px 24px 0;
  cursor: pointer;
  font-weight: bold;
  font-size: 14px;
}
.search-box button:hover {
  background: #c0392b;
}

/* Video Grid */
.video-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 24px;
}
.video-card {
  background: #171717;
  border-radius: 12px;
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
  border: 1px solid #222;
}
.video-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 8px 20px rgba(0,0,0,0.5);
  border-color: #333;
}
.thumbnail-wrapper {
  position: relative;
  width: 100%;
  aspect-ratio: 16/9;
  background: #000;
}
.thumbnail-wrapper img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.badge {
  position: absolute;
  bottom: 8px;
  right: 8px;
  background: rgba(0,0,0,0.8);
  padding: 2px 6px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: bold;
}
.video-info {
  padding: 14px;
}
.video-title {
  font-size: 14px;
  font-weight: bold;
  margin: 0 0 8px 0;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  line-height: 1.4;
}
.video-author {
  font-size: 12px;
  color: #aaa;
}

/* Video Theater Player Mode */
#player-view {
  display: none;
}
.back-btn {
  background: #222;
  border: 1px solid #444;
  color: white;
  padding: 10px 20px;
  border-radius: 20px;
  cursor: pointer;
  margin-bottom: 20px;
  font-weight: bold;
  font-size: 14px;
  transition: background 0.2s;
}
.back-btn:hover {
  background: #333;
  border-color: #666;
}
.iframe-container {
  position: relative;
  width: 100%;
  padding-bottom: 56.25%; /* Perfect 16:9 Aspect Ratio */
  height: 0;
  background: #000;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 10px 30px rgba(0,0,0,0.7);
}
.iframe-container iframe {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  border: none;
}
</style>
</head>
<body>

<div id="loading-screen">
