<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>YouTube - Carey Network</title>
<style>
* {
  box-sizing: border-box;
}
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  background: #0f0f0f;
  color: #fff;
  font-family: Arial, sans-serif;
}

/* Loading Screen */
#loading-screen {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #0f0f0f;
  z-index: 100;
  transition: opacity 0.4s ease;
}
#loading-screen.hidden {
  opacity: 0;
  pointer-events: none;
}
.loader-content {
  text-align: center;
}
.logo {
  font-size: 26px;
  font-weight: bold;
  margin-bottom: 20px;
  color: #e74c3c;
  letter-spacing: 1px;
}
.spinner {
  width: 40px;
  height: 40px;
  border: 4px solid rgba(255,255,255,0.1);
  border-top-color: #e74c3c;
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin: 0 auto 20px;
}
@keyframes spin {
  to { transform: rotate(360deg); }
}

/* Main App Layout */
#app-interface {
  padding: 20px;
  max-width: 1200px;
  margin: 0 auto;
}

/* Header & Search */
.header-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 15px;
  margin-bottom: 30px;
  border-bottom: 1px solid #222;
  padding-bottom: 15px;
}
.search-box {
  display: flex;
  width: 100%;
  max-width: 500px;
}
.search-box input {
  flex: 1;
  padding: 10px 15px;
  border: 1px solid #333;
  border-radius: 20px 0 0 20px;
  background: #121212;
  color: white;
  outline: none;
}
.search-box button {
  padding: 10px 20px;
  border: none;
  background: #e74c3c;
  color: white;
  border-radius: 0 20px 20px 0;
  cursor: pointer;
  font-weight: bold;
}
.search-box button:hover {
  background: #c0392b;
}

/* Video Grid */
.video-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
  gap: 20px;
}
.video-card {
  background: #171717;
  border-radius: 8px;
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.2s;
}
.video-card:hover {
  transform: translateY(-4px);
}
.video-card img {
  width: 100%;
  aspect-ratio: 16/9;
  object-fit: cover;
  background: #000;
}
.video-info {
  padding: 12px;
}
.video-title {
  font-size: 14px;
  font-weight: bold;
  margin: 0 0 6px 0;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  line-height: 1.3;
}
.video-author {
  font-size: 12px;
  color: #aaa;
}

/* Theater/Player View */
#player-view {
  display: none;
}
.back-btn {
  background: #222;
  border: 1px solid #444;
  color: white;
  padding: 8px 16px;
  border-radius: 4px;
  cursor: pointer;
  margin-bottom: 15px;
}
.back-btn:hover {
  background: #333;
}
.iframe-container {
  position: relative;
  width: 100%;
  padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
  height: 0;
}
.iframe-container iframe {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  border: none;
  border-radius: 8px;
}
</style>
</head>
<body>

<div id="loading-screen">
  <div class="loader-content">
    <div class="logo">Carey Network</div>
    <div class="spinner"></div>
    <div class="loading-text">Connecting to YouTube Engine...</div>
  </div>
</div>

<div id="app-interface">
  <div class="header-bar">
    <div class="logo" style="margin:0;">Carey Network TV</div>
    <div class="search-box">
      <input type="text" id="search-input" placeholder="Search YouTube videos...">
      <button id="search-btn">Search</button>
    </div>
  </div>

  <div id="browse-view">
    <h2 id="feed-title" style="font-size: 18px; color: #aaa; margin-bottom: 20px;">Trending Videos</h2>
    <div class="video-grid" id="video-grid"></div>
  </div>

  <div id="player-view">
    <button class="back-btn" id="back-btn">← Back to Browse</button>
    <div class="iframe-container">
      <iframe id="video-player" allowfullscreen allow="autoplay; encrypted-media"></iframe>
    </div>
    <h2 id="player-title" style="margin-top:15px; font-size:20px;"></h2>
  </div>
</div>

<script>
// Configuration - Using a stable community API node
const API_BASE = "https://invidious.perennialte.ch/api/v1";

const loader = document.getElementById('loading-screen');
const videoGrid = document.getElementById('video-grid');
const browseView = document.getElementById('browse-view');
const playerView = document.getElementById('player-view');
const videoPlayer = document.getElementById('video-player');
const playerTitle = document.getElementById('player-title');
const feedTitle = document.getElementById('feed-title');
const searchInput = document.getElementById('search-input');
const searchBtn = document.getElementById('search-btn');
const backBtn = document.getElementById('back-btn');

// Initial Load: Fetch Trending Content
async function fetchTrending() {
  try {
    const res = await fetch(`${API_BASE}/trending`);
    const data = await res.json();
    displayVideos(data);
  } catch (err) {
    videoGrid.innerHTML = `<p style="color:#e74c3c;">Failed to load video engine. Try refreshing.</p>`;
  } finally {
    loader.classList.add('hidden'); // Drop the loader screen
  }
}

// Search Functionality
async function searchVideos() {
  const query = searchInput.value.trim();
  if (!query) return;

  loader.classList.remove('hidden');
  feedTitle.innerText = `Search results for: "${query}"`;
  
  try {
    const res = await fetch(`${API_BASE}/search?q=${encodeURIComponent(query)}`);
    const data = await res.json();
    // Invidious search returns mixed types; filter for video objects only
    const videos = data.filter(item => item.type === 'video');
    displayVideos(videos);
    switchToBrowse();
  } catch (err) {
    videoGrid.innerHTML = `<p style="color:#e74c3c;">Search failed. Try another keyword.</p>`;
  } finally {
    loader.classList.add('hidden');
  }
}

// Generate the UI Grid cards
function displayVideos(videos) {
  videoGrid.innerHTML = "";
  if (!videos || videos.length === 0) {
    videoGrid.innerHTML = "<p>No videos found.</p>";
    return;
  }

  videos.forEach(video => {
    const card = document.createElement('div');
    card.className = 'video-card';
    
    // Find highest resolution thumbnail available
    const thumbUrl = video.videoThumbnails && video.videoThumbnails.length ? video.videoThumbnails[0].url : 'https://via.placeholder.com/320x180?text=No+Image';

    card.innerHTML = `
      <img src="${thumbUrl}" alt="thumbnail" loading="lazy">
      <div class="video-info">
        <div class="video-title">${video.title}</div>
        <div class="video-author">${video.author}</div>
      </div>
    `;
    
    card.addEventListener('click', () => playVideo(video.videoId, video.title));
    videoGrid.appendChild(card);
  });
}

// Toggle Views: Play Video
function playVideo(id, title) {
  // Use official unblocked YouTube player embed framework
  videoPlayer.src = `https://www.youtube.com/embed/${id}?autoplay=1`;
  playerTitle.innerText = title;
  browseView.style.display = "none";
  playerView.style.display = "block";
  window.scrollTo(0, 0);
}

// Toggle Views: Return back to browser layout
function switchToBrowse() {
  videoPlayer.src = ""; // Turn off video tracking/sound when leaving
  playerView.style.display = "none";
  browseView.style.display = "block";
}

// Listeners
searchBtn.addEventListener('click', searchVideos);
searchInput.addEventListener('keypress', (e) => {
  if (e.key === 'Enter') searchVideos();
});
backBtn.addEventListener('click', switchToBrowse);

// Run on start
fetchTrending();
</script>

</body>
</html>
