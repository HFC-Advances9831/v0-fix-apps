<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>YouTube - The Carey Network</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="apple-touch-icon" href="/images/icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="icon" href="/images/icon.png">
  <style>
    .game-frame {
      position: relative;
      width: 100%;
      /* Fill available height; adjust to match your layout */
      height: calc(100vh - 160px);
      min-height: 300px;
      overflow: hidden;
      background: #000;
      border-radius: 8px;
    }
    .game-frame iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
    }
    /* Shown only when iframe fails (Safari blocks it) */
    #ytFallback {
      display: none;
      position: absolute;
      inset: 0;
      background: #0f0f0f;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      color: #fff;
      font-family: sans-serif;
      text-align: center;
      padding: 2rem;
    }
    #ytFallback svg { width: 64px; height: 64px; }
    #ytFallback h2 { font-size: 1.2rem; font-weight: 600; margin: 0; }
    #ytFallback p  { font-size: 0.9rem; color: #aaa; margin: 0; max-width: 280px; }
    #ytFallback a  {
      display: inline-block;
      background: #ff0000;
      color: #fff;
      text-decoration: none;
      font-weight: 600;
      font-size: 1rem;
      padding: 12px 28px;
      border-radius: 24px;
    }
    #ytFallback a:hover { background: #cc0000; }
    #exitFullscreenBtn { display: none; }
  </style>
</head>
<body class="games-page">
<header class="site-header">
  <img src="/images/logo.png" class="logo" alt="The Carey Network Logo" />
</header>
<main>
  <section class="hero orange-bg">
    <div class="game-player">
      <div class="game-frame" id="youtubeContainer">

        <iframe
          id="gameFrame"
          src="https://www.youtube.com/embed?listType=search&list=trending"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; fullscreen"
          allowfullscreen
          webkitallowfullscreen
          frameborder="0"
          referrerpolicy="no-referrer-when-downgrade"
          title="YouTube">
        </iframe>

        <!-- Fallback shown on Safari/iOS when YouTube blocks the iframe -->
        <div id="ytFallback">
          <!-- YouTube logo -->
          <svg viewBox="0 0 90 20" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M27.97 3.12a3.3 3.3 0 0 0-2.32-2.34C23.37.2 14.5.2 14.5.2S5.63.2 3.35.78A3.3 3.3 0 0 0 1.03 3.12C.46 5.42.46 10.2.46 10.2s0 4.78.57 7.08a3.3 3.3 0 0 0 2.32 2.34c2.28.58 11.15.58 11.15.58s8.87 0 11.15-.58a3.3 3.3 0 0 0 2.32-2.34c.57-2.3.57-7.08.57-7.08s0-4.78-.57-7.08z" fill="#FF0000"/>
            <path d="M11.73 14.5l7.44-4.3-7.44-4.3v8.6z" fill="#fff"/>
            <path d="M37.2 13.2L34.1 2.6h2.3l1.2 5.1.3 1.4h.1l.3-1.4 1.3-5.1h2.3l-3.1 10.6v5.2h-2.2v-5.2zm9.9.3c-.7 0-1.2-.3-1.6-.8v.9h-2V2.6h2v4.3c.4-.6.9-.9 1.6-.9 1.4 0 2.1 1.1 2.1 3.3v.9c0 2.1-.7 3.3-2.1 3.3zm-.6-1.7c.6 0 .8-.5.8-1.6v-.9c0-1.1-.3-1.6-.8-1.6-.3 0-.6.1-.9.4v3.3c.3.3.6.4.9.4zm8.1 1.7c-.7 0-1.2-.3-1.6-.9v.8h-2V5.2h2v7.3c.3.3.6.5.9.5.5 0 .7-.3.7-.9V5.2h2v7.5c0 .6-.1 1.1-.4 1.4-.3.4-.8.6-1.6.6zm8.3-.1c-.3.1-.7.1-1 .1-1 0-1.5-.5-1.5-1.6V6.9h-1V5.2h1V3h2v2.2h1.4v1.7h-1.4v5c0 .4.2.6.6.6.3 0 .5 0 .7-.1l.2 1.8zm2.5-10.8c-.3-.3-.5-.7-.5-1.1s.2-.8.5-1.1c.3-.3.7-.4 1.1-.4s.8.1 1.1.4c.3.3.5.7.5 1.1s-.2.8-.5 1.1c-.3.3-.7.4-1.1.4s-.8-.1-1.1-.4zm-.1 10.8V5.2h2v8.6h-2zm9.1.1c-1 0-1.8-.3-2.3-.9-.5-.6-.8-1.5-.8-2.6v-.9c0-1.1.3-2 .8-2.6.5-.6 1.3-.9 2.3-.9 2 0 3.1 1.2 3.1 3.5v.9c0 2.4-1.1 3.5-3.1 3.5zm0-1.7c.9 0 1.2-.6 1.2-1.8v-.9c0-1.2-.4-1.8-1.2-1.8s-1.2.6-1.2 1.8v.9c0 1.2.4 1.8 1.2 1.8zm8.6 1.6c-.7 0-1.2-.3-1.6-.9v.8h-2V2.6h2v4.3c.4-.6.9-.9 1.6-.9 1.4 0 2.1 1.1 2.1 3.3v.9c0 2.1-.7 3.3-2.1 3.3zm-.6-1.7c.6 0 .8-.5.8-1.6v-.9c0-1.1-.3-1.6-.8-1.6-.3 0-.6.1-.9.4v3.3c.3.3.6.4.9.4z" fill="#fff"/>
          </svg>
          <h2>Safari can't load YouTube here</h2>
          <p>Safari blocks YouTube inside iframes. Tap below to open YouTube directly.</p>
          <a href="https://m.youtube.com" target="_blank" rel="noopener">Open YouTube</a>
        </div>

      </div>
      <div class="game-controls">
        <button onclick="refreshGame()">
          <img src="/images/refresh.png" alt="Refresh">
        </button>
        <button onclick="toggleFullscreen()">
          <img src="/images/fullscreen.png" alt="Fullscreen">
        </button>
        <button onclick="openDeletePopup()">
          <img src="/images/delete.png" alt="Delete Save">
        </button>
      </div>
    </div>
  </section>
</main>
<div id="nav-container"></div>
<footer class="site-footer">
  <p>&copy; 2026 The Carey Network</p>
</footer>
<button id="exitFullscreenBtn" onclick="exitFullscreenMode()">&#x2715;</button>
<div id="deletePopup" class="popup-overlay">
  <div class="popup-content">
    <p>Delete Saves (ts purges all data btw bc im dumb)</p>
    <button onclick="confirmDelete()">Delete Saves</button>
    <button onclick="closeDeletePopup()" style="margin-top:10px; background:#333;">Cancel</button>
  </div>
</div>
<script src="/js/main.js"></script>
<script>
  /* Detect if YouTube iframe loaded or was blocked */
  var frame = document.getElementById('gameFrame');
  var fallback = document.getElementById('ytFallback');

  /* Give the iframe 4 seconds to load; if it stays blank, show fallback */
  var ytTimer = setTimeout(function() {
    showFallback();
  }, 4000);

  frame.addEventListener('load', function() {
    clearTimeout(ytTimer);
    /* Try to read the iframe content; if blocked it throws or is empty */
    try {
      var doc = frame.contentDocument || frame.contentWindow.document;
      if (!doc || doc.body === null || doc.body.innerHTML.trim() === '') {
        showFallback();
      } else {
        clearTimeout(ytTimer);
      }
    } catch(e) {
      /* Cross-origin block — means YouTube DID load (good!) */
      clearTimeout(ytTimer);
    }
  });

  frame.addEventListener('error', function() {
    clearTimeout(ytTimer);
    showFallback();
  });

  function showFallback() {
    frame.style.display = 'none';
    fallback.style.display = 'flex';
  }

  function refreshGame() {
    if (fallback.style.display === 'flex') return; /* don't reload if showing fallback */
    var src = frame.src;
    frame.src = '';
    setTimeout(function() { frame.src = src; }, 150);
  }

  function toggleFullscreen() {
    var container = document.getElementById('youtubeContainer');
    var btn = document.getElementById('exitFullscreenBtn');
    var isFS = document.fullscreenElement || document.webkitFullscreenElement;
    if (isFS) {
      if (document.exitFullscreen) document.exitFullscreen();
      else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
    } else {
      if (container.requestFullscreen) container.requestFullscreen();
      else if (container.webkitRequestFullscreen) container.webkitRequestFullscreen();
      btn.style.display = 'flex';
    }
  }

  function exitFullscreenMode() {
    if (document.exitFullscreen) document.exitFullscreen();
    else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
    document.getElementById('exitFullscreenBtn').style.display = 'none';
  }

  function openDeletePopup()  { document.getElementById('deletePopup').style.display = 'flex'; }
  function closeDeletePopup() { document.getElementById('deletePopup').style.display = 'none'; }

  function confirmDelete() {
    localStorage.clear();
    sessionStorage.clear();
    document.cookie.split(';').forEach(function(c) {
      var name = c.split('=')[0].trim();
      document.cookie = name + '=;expires=Thu, 01 Jan 1970 00:00:00 GMT;path=/';
    });
    closeDeletePopup();
    refreshGame();
  }

  document.addEventListener('fullscreenchange', function() {
    if (!document.fullscreenElement)
      document.getElementById('exitFullscreenBtn').style.display = 'none';
  });
  document.addEventListener('webkitfullscreenchange', function() {
    if (!document.webkitFullscreenElement)
      document.getElementById('exitFullscreenBtn').style.display = 'none';
  });
</script>
</body>
</html>
