<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Carey Network - Test Page</title>
<style>
  body { 
    background: #2c3e50; 
    color: white; 
    font-family: sans-serif; 
    text-align: center; 
    padding: 40px 20px; 
  }
  .container {
    max-width: 600px;
    margin: 0 auto;
    background: #34495e;
    padding: 30px;
    border-radius: 12px;
    border: 3px solid #e74c3c;
    box-shadow: 0 10px 20px rgba(0,0,0,0.3);
  }
  iframe { 
    width: 100%; 
    aspect-ratio: 16/9; 
    border: 2px solid white; 
    margin-top: 20px; 
    background: #000;
  }
</style>
</head>
<body>

<div class="container">
  <h1 style="color: #e74c3c; margin-top: 0;">Carey TV Diagnostic Test</h1>
  <p><strong>Status:</strong> If you can see this blue/gray background and red box, your Vercel deployment is working perfectly!</p>
  
  <hr style="border: 0; border-top: 1px solid #5c758e; margin: 20px 0;">
  
  <p>Below is a direct video embed test. If the box below stays pure black or says "Connection Refused," your iPad or Wi-Fi network is blocking YouTube embeds.</p>
  
  <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" allowfullscreen></iframe>
</div>

</body>
</html>
